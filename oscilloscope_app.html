<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Осциллограф</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --card:    #1c2128;
    --border:  #30363d;
    --green:   #3fb950;
    --green2:  #238636;
    --blue:    #58a6ff;
    --amber:   #d29922;
    --red:     #f85149;
    --text:    #e6edf3;
    --muted:   #7d8590;
    --r:       10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .3s, box-shadow .3s; }
  .dot.live { background: var(--green); box-shadow: 0 0 7px var(--green); }
  .pill {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--card); color: var(--muted);
    transition: all .2s;
  }
  .pill.ok  { color: var(--green); border-color: var(--green2); }
  .pill.err { color: var(--red);   border-color: var(--red); }

  /* ── Platform notice ── */
  .notice {
    margin: 10px 12px 0;
    padding: 9px 13px;
    border-radius: var(--r);
    font-size: 12px;
    line-height: 1.5;
  }
  .notice.warn { background: rgba(210,153,34,.1); border: 1px solid rgba(210,153,34,.35); color: var(--amber); }
  .notice.err  { background: rgba(248,81,73,.08); border: 1px solid rgba(248,81,73,.3);   color: var(--red); }
  .notice.info { background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.25); color: var(--blue); }

  main { flex: 1; display: flex; flex-direction: column; padding: 10px 12px; gap: 10px; }

  /* ── Chart ── */
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 10px;
  }
  .chart-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    gap: 6px;
    flex-wrap: wrap;
  }
  .chart-meta .meta-time { color: var(--blue); font-weight: 600; }
  canvas#scope { width: 100% !important; height: 200px !important; display: block; }

  /* ── Stats ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 8px 6px; text-align: center;
  }
  .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .v-min { color: var(--blue); }
  .v-max { color: var(--amber); }
  .v-avg { color: var(--green); }
  .v-vpp { color: var(--text); }

  /* ── Controls ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 12px;
  }
  .card-title {
    font-size: 10px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .7px; margin-bottom: 10px;
  }

  /* delay slider + input */
  .delay-wrap { display: flex; flex-direction: column; gap: 8px; }
  .delay-top { display: flex; align-items: center; gap: 8px; }
  .delay-top label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: var(--green); cursor: pointer; height: 4px; }
  .delay-input-wrap { display: flex; align-items: center; gap: 6px; }
  .delay-input-wrap input[type=number] {
    width: 80px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    padding: 5px 8px;
    text-align: right;
    -moz-appearance: textfield;
  }
  .delay-input-wrap input[type=number]::-webkit-inner-spin-button { display: none; }
  .delay-input-wrap input[type=number]:focus { outline: none; border-color: var(--green); }
  .delay-unit { font-size: 12px; color: var(--muted); }

  /* presets */
  .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .preset {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted); font-size: 11px;
    padding: 4px 10px; cursor: pointer; transition: all .12s;
  }
  .preset:active, .preset.active-p { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.08); }

  /* divider tabs */
  .div-tabs { display: flex; gap: 5px; margin-bottom: 10px; }
  .div-tab {
    flex: 1; padding: 6px 4px; border-radius: 6px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all .12s;
  }
  .div-tab.active { background: rgba(210,153,34,.15); border-color: var(--amber); color: var(--amber); }
  .div-row { display: flex; align-items: center; gap: 8px; }
  .div-row label { font-size: 12px; color: var(--muted); flex: 1; }
  .div-row input[type=number] {
    width: 90px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 14px; font-weight: 700;
    padding: 5px 8px; text-align: right; -moz-appearance: textfield;
  }
  .div-row input[type=number]::-webkit-inner-spin-button { display: none; }
  .div-row input[type=number]:focus { outline: none; border-color: var(--amber); }
  .div-unit { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .div-hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .div-result {
    margin-top: 8px; padding: 6px 10px; border-radius: 6px;
    background: rgba(210,153,34,.08); border: 1px solid rgba(210,153,34,.25);
    font-size: 12px; font-weight: 600; color: var(--amber);
  }

  /* buttons */
  .action-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn {
    flex: 1; border-radius: 8px; border: 1px solid var(--border);
    font-size: 13px; font-weight: 700; padding: 11px 8px;
    cursor: pointer; transition: all .15s; background: transparent; color: var(--text);
  }
  .btn-connect { background: var(--green2); border-color: var(--green); color: #fff; }
  .btn-connect:active { background: #2ea043; }
  .btn-connect.disc { background: transparent; border-color: var(--red); color: var(--red); }
  .btn-pause { border-color: var(--amber); color: var(--amber); flex: 0 0 48px; }
  .btn-pause:active { background: rgba(210,153,34,.1); }

  /* log */
  .log-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r); padding: 9px 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px; color: var(--muted);
    height: 76px; overflow-y: auto; line-height: 1.65;
  }
  .log-card .tx  { color: var(--blue); }
  .log-card .rx  { color: var(--green); }
  .log-card .err { color: var(--red); }
  .log-card .inf { color: var(--amber); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dot" id="dot"></div>
    Осциллограф
  </div>
  <div class="pill" id="pill">Не подключено</div>
</header>

<!-- Platform notices inserted here by JS -->
<div id="notices"></div>

<main>
  <!-- Chart -->
  <div class="chart-card">
    <div class="chart-meta">
      <span id="metaPoints">512 точек</span>
      <span class="meta-time" id="metaTime">—</span>
      <span id="metaDelay">задержка: 500 мкс</span>
    </div>
    <canvas id="scope"></canvas>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat"><div class="stat-label">Min, В</div><div class="stat-value v-min" id="sMin">—</div></div>
    <div class="stat"><div class="stat-label">Max, В</div><div class="stat-value v-max" id="sMax">—</div></div>
    <div class="stat"><div class="stat-label">Avg, В</div><div class="stat-value v-avg" id="sAvg">—</div></div>
    <div class="stat"><div class="stat-label">Vpp, В</div><div class="stat-value v-vpp" id="sVpp">—</div></div>
  </div>

  <!-- Controls -->
  <div class="card">
    <div class="card-title">Задержка между сэмплами</div>

    <div class="delay-wrap">
      <div class="delay-top">
        <label for="slider">мкс</label>
        <input type="range" id="slider" min="1" max="5000" value="500" step="1">
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div class="delay-input-wrap">
          <input type="number" id="delayNum" min="1" max="99999" value="500">
          <span class="delay-unit">мкс</span>
        </div>
        <span style="font-size:11px;color:var(--muted)" id="timeHint"></span>
      </div>
      <div class="presets" id="presets"></div>
    </div>

    <!-- Voltage divider -->
    <div style="margin-top:14px;">
      <div class="card-title">Делитель напряжения</div>
      <div class="div-tabs" id="divTabs">
        <button class="div-tab active" data-mode="none">Без делителя</button>
        <button class="div-tab" data-mode="vmax">Макс. напряжение</button>
        <button class="div-tab" data-mode="res">Резисторы</button>
      </div>
      <div class="div-panel" id="dpNone">
        <div class="div-hint">Коэффициент = 1 × (сигнал 0–5 В напрямую)</div>
      </div>
      <div class="div-panel" id="dpVmax" style="display:none">
        <div class="div-row">
          <label>Макс. напряжение сигнала</label>
          <input type="number" id="vmaxInput" min="1" max="9999" value="12" step="0.1">
          <span class="div-unit">В</span>
        </div>
        <div class="div-hint" id="vmaxHint"></div>
      </div>
      <div class="div-panel" id="dpRes" style="display:none">
        <div class="div-row">
          <label>R1 (верхний)</label>
          <input type="number" id="r1Input" min="0" max="9999999" value="10000" step="100">
          <span class="div-unit">Ом</span>
        </div>
        <div class="div-row" style="margin-top:6px">
          <label>R2 (нижний, к GND)</label>
          <input type="number" id="r2Input" min="1" max="9999999" value="1000" step="100">
          <span class="div-unit">Ом</span>
        </div>
        <div class="div-hint" id="resHint"></div>
      </div>
      <div class="div-result" id="divResult">Коэффициент: 1.00 ×　Макс: 5.0 В</div>
    </div>

    <div class="action-row">
      <button class="btn btn-connect" id="btnConnect">Подключить USB</button>
      <button class="btn btn-pause" id="btnPause" title="Пауза/Пуск">⏸</button>
    </div>
  </div>

  <!-- Log -->
  <div class="log-card" id="log"></div>
</main>

<script>
// ════════════════════════════════════════════════════════════
//  Константы
// ════════════════════════════════════════════════════════════
const NUM    = 512;
const VREF   = 5.0;   // опорное напряжение Arduino (5.0 или 3.3)
const BAUD   = 115200;

// ════════════════════════════════════════════════════════════
//  Определение платформы
// ════════════════════════════════════════════════════════════
const ua       = navigator.userAgent;
const isAndroid = /Android/i.test(ua);
const isIOS     = /iPhone|iPad|iPod/i.test(ua);
const isMobile  = isAndroid || isIOS;
const hasSerial = 'serial' in navigator;

function addNotice(msg, cls) {
  const box = document.getElementById('notices');
  const d = document.createElement('div');
  d.className = 'notice ' + cls;
  d.innerHTML = msg;
  box.appendChild(d);
}

if (!hasSerial) {
  if (isIOS) {
    addNotice('⚠ iOS не поддерживает WebSerial. Подключитесь с Android-устройства или ПК через Chrome.', 'err');
  } else if (isMobile) {
    addNotice('⚠ Включите WebSerial: <b>chrome://flags/#enable-experimental-web-platform-features</b> → Enabled, перезапустите Chrome.', 'warn');
  } else {
    addNotice('⚠ WebSerial не поддерживается. Используйте Chrome или Edge.', 'err');
  }
} else if (isAndroid) {
  addNotice('📱 Android: подключите Arduino через кабель OTG (USB-C → USB-A). Нажмите «Подключить USB» — Chrome запросит разрешение.', 'info');
}

// ════════════════════════════════════════════════════════════
//  Состояние
// ════════════════════════════════════════════════════════════
let port = null, reader = null, writer = null;
let connected = false, paused = false;
let currentDelay = 500;
let divider = 1;
let sendTimer = null;   // debounce отправки команды

// ════════════════════════════════════════════════════════════
//  Chart.js
// ════════════════════════════════════════════════════════════
const scopeCtx = document.getElementById('scope').getContext('2d');
const chart = new Chart(scopeCtx, {
  type: 'line',
  data: {
    labels: Array.from({length: NUM}, (_, i) => i),
    datasets: [{
      data: new Array(NUM).fill(0),
      borderColor: '#3fb950',
      borderWidth: 1.2,
      pointRadius: 0,
      tension: 0,
      fill: false
    }]
  },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { enabled: false } },
    scales: {
      x: { display: false },
      y: {
        min: 0,
        ticks: {
          color: '#7d8590', font: { size: 10 },
          callback: v => v.toFixed(1) + ' В',
          maxTicksLimit: 6
        },
        grid: { color: 'rgba(255,255,255,0.05)' }
      }
    }
  }
});

function updateChartMax() {
  chart.options.scales.y.max = VREF * divider;
  chart.update('none');
}
updateChartMax();

// ════════════════════════════════════════════════════════════
//  Лог
// ════════════════════════════════════════════════════════════
const logEl = document.getElementById('log');
function log(text, cls = '') {
  const d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = text;
  logEl.appendChild(d);
  while (logEl.children.length > 60) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

// ════════════════════════════════════════════════════════════
//  Статус
// ════════════════════════════════════════════════════════════
const pillEl = document.getElementById('pill');
const dotEl  = document.getElementById('dot');
const btnCon = document.getElementById('btnConnect');
function setStatus(s) {
  pillEl.className = 'pill' + (s === 'ok' ? ' ok' : s === 'err' ? ' err' : '');
  dotEl.className  = 'dot'  + (s === 'ok' ? ' live' : '');
  if (s === 'ok') {
    pillEl.textContent = 'Подключено';
    btnCon.textContent = 'Отключить';
    btnCon.classList.add('disc');
  } else {
    pillEl.textContent = s === 'err' ? 'Ошибка' : 'Не подключено';
    btnCon.textContent = 'Подключить USB';
    btnCon.classList.remove('disc');
  }
}

// ════════════════════════════════════════════════════════════
//  Подключение / отключение
// ════════════════════════════════════════════════════════════
btnCon.addEventListener('click', async () => {
  if (connected) { await disconnect(); return; }
  if (!hasSerial) { log('WebSerial не поддерживается', 'err'); return; }
  try {
    port = await navigator.serial.requestPort();
    try { await port.close(); } catch(_) {}
    await port.open({ baudRate: BAUD, bufferSize: 65536 });
    writer = port.writable.getWriter();
    connected = true;
    lineBuffer = '';
    setStatus('ok');
    log('Подключено', 'rx');
    readLoop();
    scheduleSend();
  } catch (e) {
    log('Ошибка подключения: ' + e.message, 'err');
    setStatus('err');
  }
});

async function disconnect() {
  connected = false;
  try { if (reader) { await reader.cancel(); } } catch(_) {}
  try { if (writer) { writer.releaseLock(); } } catch(_) {}
  try { if (port)   { await port.close(); } } catch(_) {}
  reader = null; writer = null; port = null;
  setStatus('');
  log('Отключено');
}

// ════════════════════════════════════════════════════════════
//  Чтение Serial
//  BufferOverrunError — не обрыв, а временное переполнение кольцевого
//  буфера USB. Перехватываем внутри цикла: сбрасываем незавершённую
//  строку и продолжаем читать тот же reader — порт не закрываем.
// ════════════════════════════════════════════════════════════
let lineBuffer = '';
const dec = new TextDecoder();

async function readLoop() {
  // После BufferOverrunError reader становится непригодным —
  // нужно releaseLock и взять новый. Делаем это в цикле переподключений.
  while (connected) {
    try {
      reader = port.readable.getReader();
      while (connected) {
        const res = await reader.read();
        if (res.done) break;
        lineBuffer += dec.decode(res.value, { stream: true });
        let nl;
        while ((nl = lineBuffer.indexOf('\n')) !== -1) {
          const line = lineBuffer.slice(0, nl).trim();
          lineBuffer = lineBuffer.slice(nl + 1);
          if (line.length) handleLine(line);
        }
        if (lineBuffer.length > 32768) lineBuffer = '';
      }
      break; // вышли нормально — выходим из внешнего цикла
    } catch(e) {
      // Освобождаем сломанный reader в любом случае
      try { reader.releaseLock(); } catch(_) {}
      reader = null;
      lineBuffer = '';

      if (e.name === 'BufferOverrunError' || /overrun/i.test(e.message)) {
        // Временное переполнение — просто берём новый reader и едем дальше
        log('⚡ overrun — пропуск кадра', 'inf');
        await new Promise(r => setTimeout(r, 10)); // tiny pause before re-read
        continue;
      }
      // Любая другая ошибка — настоящий обрыв
      if (connected) {
        log('Разрыв: ' + e.message, 'err');
        setStatus('err');
      }
      break;
    }
  }
  try { if (reader) reader.releaseLock(); } catch(_) {}
  reader = null;
}


// ════════════════════════════════════════════════════════════
//  Обработка входящих строк
// ════════════════════════════════════════════════════════════
function handleLine(line) {
  if (line.startsWith('DATA:')) {
    if (paused) return;
    const raw = line.slice(5).split(',').map(Number);
    if (raw.length < 10) return;
    const volts = raw.map(v => (v / 1023) * VREF * divider);
    chart.data.datasets[0].data = volts;
    chart.update('none');
    updateStats(volts);
    document.getElementById('metaPoints').textContent = raw.length + ' точек';
  } else if (line.startsWith('OK:')) {
    log('← ' + line, 'rx');
  } else if (line.length) {
    log('← ' + line, 'rx');
  }
}

// ════════════════════════════════════════════════════════════
//  Статистика
// ════════════════════════════════════════════════════════════
function updateStats(volts) {
  const mn = Math.min(...volts), mx = Math.max(...volts);
  const avg = volts.reduce((a, b) => a + b, 0) / volts.length;
  document.getElementById('sMin').textContent = mn.toFixed(3);
  document.getElementById('sMax').textContent = mx.toFixed(3);
  document.getElementById('sAvg').textContent = avg.toFixed(3);
  document.getElementById('sVpp').textContent = (mx - mn).toFixed(3);
}

// ════════════════════════════════════════════════════════════
//  Отправка команды (debounce 150 мс)
// ════════════════════════════════════════════════════════════
function scheduleSend() {
  clearTimeout(sendTimer);
  sendTimer = setTimeout(sendDelay, 150);
}

async function sendDelay() {
  if (!writer) return;
  const val = currentDelay;
  await sendCmd('RANGE:US');
  await new Promise(r => setTimeout(r, 60));
  await sendCmd('DELAY:' + val);
}

async function sendCmd(cmd) {
  if (!writer) return;
  try {
    await writer.write(new TextEncoder().encode(cmd + '\n'));
    log('→ ' + cmd, 'tx');
  } catch(e) {
    log('Ошибка отправки: ' + e.message, 'err');
  }
}

// ════════════════════════════════════════════════════════════
//  UI задержки
// ════════════════════════════════════════════════════════════
const PRESETS = [1, 10, 50, 100, 200, 500, 1000, 2000, 5000];
const slider   = document.getElementById('slider');
const numInput = document.getElementById('delayNum');
const timeHint = document.getElementById('timeHint');

function formatTime(us) {
  const total = us * NUM; // мкс
  if (total < 1000)      return total.toFixed(0) + ' мкс';
  if (total < 1000000)   return (total / 1000).toFixed(1) + ' мс';
  return (total / 1000000).toFixed(2) + ' с';
}

function applyDelay(val, fromSlider) {
  val = Math.max(1, Math.min(99999, Math.round(val)));
  currentDelay = val;

  // синхронизируем ползунок и поле
  const sliderVal = Math.min(val, 5000);
  if (!fromSlider) slider.value = sliderVal;
  numInput.value = val;

  // мета
  document.getElementById('metaDelay').textContent = 'задержка: ' + val + ' мкс';
  document.getElementById('metaTime').textContent  = '⏱ ' + formatTime(val);
  timeHint.textContent = 'Кадр: ' + formatTime(val);

  // подсветка пресетов
  document.querySelectorAll('.preset').forEach(b => {
    b.classList.toggle('active-p', parseInt(b.dataset.v) === val);
  });

  scheduleSend();
}

// Пресеты
const presetsEl = document.getElementById('presets');
PRESETS.forEach(v => {
  const b = document.createElement('button');
  b.className = 'preset';
  b.textContent = v < 1000 ? v + ' мкс' : (v / 1000) + ' мс';
  b.dataset.v = v;
  b.onclick = () => applyDelay(v, false);
  presetsEl.appendChild(b);
});

// 'input' — обновляем число и подсказку сразу, но НЕ отправляем на Arduino
slider.addEventListener('input', () => {
  const v = parseInt(slider.value);
  numInput.value = v;
  document.getElementById('metaDelay').textContent = 'задержка: ' + v + ' мкс';
  document.getElementById('metaTime').textContent  = '⏱ ' + formatTime(v);
  timeHint.textContent = 'Кадр: ' + formatTime(v);
  document.querySelectorAll('.preset').forEach(b => {
    b.classList.toggle('active-p', parseInt(b.dataset.v) === v);
  });
});
// 'change' — отправляем только при отпускании
slider.addEventListener('change', () => applyDelay(parseInt(slider.value), true));
numInput.addEventListener('input', () => {
  const v = parseInt(numInput.value);
  if (v > 0) applyDelay(v, false);
});
numInput.addEventListener('change', () => {
  const v = parseInt(numInput.value);
  if (v > 0) applyDelay(v, false);
});

// ════════════════════════════════════════════════════════════
//  Делитель напряжения (три режима)
// ════════════════════════════════════════════════════════════
let divMode = 'none';   // 'none' | 'vmax' | 'res'

const divResult  = document.getElementById('divResult');
const dpNone     = document.getElementById('dpNone');
const dpVmax     = document.getElementById('dpVmax');
const dpRes      = document.getElementById('dpRes');
const vmaxInput  = document.getElementById('vmaxInput');
const vmaxHint   = document.getElementById('vmaxHint');
const r1Input    = document.getElementById('r1Input');
const r2Input    = document.getElementById('r2Input');
const resHint    = document.getElementById('resHint');

function calcDivider() {
  let k = 1;
  if (divMode === 'vmax') {
    const vmax = parseFloat(vmaxInput.value) || VREF;
    k = vmax / VREF;
    vmaxHint.textContent =
      `Делитель: (R1+R2)/R2 = ${k.toFixed(3)} × Диапазон: 0 – ${vmax.toFixed(1)} В`;
  } else if (divMode === 'res') {
    const r1 = parseFloat(r1Input.value) || 0;
    const r2 = parseFloat(r2Input.value) || 1;
    k = (r1 + r2) / r2;
    const vmax = (VREF * k).toFixed(2);
    resHint.textContent =
      `Коэффициент: (${r1}+${r2})/${r2} = ${k.toFixed(3)} × Макс: ${vmax} В`;
  }
  divider = Math.max(1, k);
  divResult.textContent =
    `Коэффициент: ${divider.toFixed(3)} × Макс: ${(VREF * divider).toFixed(2)} В`;
  updateChartMax();
}

// Переключение режимов
document.querySelectorAll('.div-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    divMode = tab.dataset.mode;
    document.querySelectorAll('.div-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    dpNone.style.display = divMode === 'none' ? '' : 'none';
    dpVmax.style.display = divMode === 'vmax' ? '' : 'none';
    dpRes.style.display  = divMode === 'res'  ? '' : 'none';
    calcDivider();
  });
});

vmaxInput.addEventListener('input',  calcDivider);
vmaxInput.addEventListener('change', calcDivider);
r1Input.addEventListener('input',    calcDivider);
r1Input.addEventListener('change',   calcDivider);
r2Input.addEventListener('input',    calcDivider);
r2Input.addEventListener('change',   calcDivider);

// ════════════════════════════════════════════════════════════
//  Пауза
// ════════════════════════════════════════════════════════════
document.getElementById('btnPause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? '▶' : '⏸';
});

// ════════════════════════════════════════════════════════════
//  Закрытие порта при уходе со страницы
//  (beforeunload не всегда срабатывает на мобиле, но помогает на ПК)
// ════════════════════════════════════════════════════════════
window.addEventListener('beforeunload', () => {
  if (port && connected) {
    connected = false;
    try { port.close(); } catch(_) {}
  }
});

// Если страница уходит в фон на Android — пробуем освободить порт
document.addEventListener('visibilitychange', () => {
  if (document.hidden && port && connected) {
    // не отключаем полностью — только помечаем; при возврате порт обычно жив
  }
});

// ════════════════════════════════════════════════════════════
//  Инициализация
// ════════════════════════════════════════════════════════════
applyDelay(500, false);
calcDivider();
</script>
</body>
</html>
